<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONKMENG AI - Code Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            height: 100vh;
        }
        .code-font { font-family: 'Fira Code', monospace; }
        
        /* Custom scrollbar for result area only */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Gradient background */
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Loading animation */
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        
        /* Fade in animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
    </style>
</head>
<body class="bg-slate-900">
    <!-- Main Container - Full Height, No Scroll -->
    <div class="h-screen flex flex-col">
        <!-- Header -->
        <header class="gradient-bg text-white px-6 py-4 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 backdrop-blur rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">KONKMENG AI</h1>
                        <p class="text-xs text-white/80">Powered by Groq</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <select id="lang-select" class="bg-white/20 backdrop-blur text-white text-sm px-3 py-2 rounded-lg border border-white/30 focus:outline-none focus:ring-2 focus:ring-white/50">
                        <option value="en">English</option>
                        <option value="km">ខ្មែរ</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Content Area - Split View -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Left Panel - Code Input -->
            <div class="w-1/2 bg-slate-800 flex flex-col border-r border-slate-700">
                <!-- Language Selector -->
                <div class="px-4 py-3 bg-slate-900/50 border-b border-slate-700 flex items-center justify-between">
                    <select id="language-select" class="bg-slate-700 text-white text-sm px-4 py-2 rounded-lg border border-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="JavaScript">JavaScript</option>
                        <option value="Python">Python</option>
                        <option value="TypeScript">TypeScript</option>
                        <option value="Java">Java</option>
                        <option value="C++">C++</option>
                        <option value="C#">C#</option>
                        <option value="PHP">PHP</option>
                        <option value="Ruby">Ruby</option>
                        <option value="Go">Go</option>
                        <option value="Rust">Rust</option>
                    </select>
                    
                    <button id="analyze-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <span>Analyze</span>
                    </button>
                </div>
                
                <!-- Code Editor -->
                <div class="flex-1 p-4">
                    <textarea 
                        id="code-input" 
                        class="w-full h-full bg-slate-900 text-slate-100 code-font text-sm p-4 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
                        placeholder="// Paste your code here...&#10;&#10;function example() {&#10;    return 'Hello World';&#10;}"
                    ></textarea>
                </div>
            </div>

            <!-- Right Panel - AI Response -->
            <div class="w-1/2 bg-slate-900 flex flex-col">
                <!-- Response Header -->
                <div class="px-4 py-3 bg-slate-800/50 border-b border-slate-700 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        <span class="text-slate-300 font-medium">AI Analysis</span>
                    </div>
                    
                    <button id="copy-btn" class="text-slate-400 hover:text-white transition-colors" title="Copy response">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Response Content -->
                <div id="result-container" class="flex-1 overflow-y-auto custom-scroll p-6">
                    <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center">
                        <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                            </svg>
                        </div>
                        <h3 class="text-slate-400 text-lg font-medium mb-2">Ready to analyze</h3>
                        <p class="text-slate-500 text-sm">Paste your code and click Analyze</p>
                    </div>
                    
                    <div id="loading-state" class="hidden h-full flex flex-col items-center justify-center">
                        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p class="text-slate-400">Analyzing your code...</p>
                    </div>
                    
                    <div id="result-content" class="hidden prose prose-invert max-w-none"></div>
                    
                    <div id="error-state" class="hidden">
                        <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-4">
                            <div class="flex items-start gap-3">
                                <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <div>
                                    <h4 class="text-red-400 font-medium mb-1">Analysis Failed</h4>
                                    <p id="error-message" class="text-red-300/80 text-sm"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        function getApiBaseUrl() {
            return window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                ? 'http://localhost:3000' 
                : 'https://konkmeng.onrender.com';
        }

        // DOM Elements
        const codeInput = document.getElementById('code-input');
        const languageSelect = document.getElementById('language-select');
        const langSelect = document.getElementById('lang-select');
        const analyzeBtn = document.getElementById('analyze-btn');
        const copyBtn = document.getElementById('copy-btn');
        const emptyState = document.getElementById('empty-state');
        const loadingState = document.getElementById('loading-state');
        const resultContent = document.getElementById('result-content');
        const errorState = document.getElementById('error-state');
        const errorMessage = document.getElementById('error-message');

        // Analyze Code
        analyzeBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim();
            const language = languageSelect.value;
            const responseLang = langSelect.value;

            if (!code) {
                showError('Please enter some code to analyze');
                return;
            }

            // Show loading
            emptyState.classList.add('hidden');
            errorState.classList.add('hidden');
            resultContent.classList.add('hidden');
            loadingState.classList.remove('hidden');
            analyzeBtn.disabled = true;

            try {
                const response = await fetch(`${getApiBaseUrl()}/api/analyze-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, language, responseLang })
                });

                const data = await response.json();

                if (data.success) {
                    showResult(data.analysis);
                } else {
                    showError(data.error || 'Analysis failed');
                }
            } catch (error) {
                showError('Failed to connect to server: ' + error.message);
            } finally {
                loadingState.classList.add('hidden');
                analyzeBtn.disabled = false;
            }
        });

        // Show Result
        function showResult(analysis) {
            emptyState.classList.add('hidden');
            errorState.classList.add('hidden');
            loadingState.classList.add('hidden');
            resultContent.classList.remove('hidden');
            
            // Convert markdown-style formatting to HTML
            let html = analysis
                .replace(/```(\w+)\n([\s\S]*?)```/g, '<pre class="bg-slate-800 p-4 rounded-lg overflow-x-auto my-4"><code class="code-font text-sm text-slate-100">$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-slate-800 text-indigo-400 px-2 py-0.5 rounded text-sm">$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong class="text-white font-semibold">$1</strong>')
                .replace(/^• (.+)$/gm, '<li class="ml-4">$1</li>')
                .replace(/^┌─+┐$/gm, '<div class="border-t-2 border-l-2 border-r-2 border-slate-700 rounded-t-lg mt-6"></div>')
                .replace(/^│ (.+) │$/gm, '<div class="border-l-2 border-r-2 border-slate-700 px-4 py-2 text-slate-200 font-medium">$1</div>')
                .replace(/^└─+┘$/gm, '<div class="border-b-2 border-l-2 border-r-2 border-slate-700 rounded-b-lg mb-2"></div>')
                .replace(/\n\n/g, '</p><p class="text-slate-300 leading-relaxed my-3">');
            
            resultContent.innerHTML = '<div class="fade-in">' + html + '</div>';
        }

        // Show Error
        function showError(message) {
            emptyState.classList.add('hidden');
            loadingState.classList.add('hidden');
            resultContent.classList.add('hidden');
            errorState.classList.remove('hidden');
            errorMessage.textContent = message;
        }

        // Copy Result
        copyBtn.addEventListener('click', () => {
            const text = resultContent.innerText;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                setTimeout(() => {
                    copyBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>';
                }, 2000);
            });
        });

        // Keyboard shortcut: Ctrl/Cmd + Enter to analyze
        codeInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                analyzeBtn.click();
            }
        });
    </script>
</body>
</html>
